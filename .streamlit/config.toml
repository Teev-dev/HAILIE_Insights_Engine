[server]
headless = true
address = "0.0.0.0"
enableCORS = true
enableXsrfProtection = true
maxUploadSize = 200
enableWebsocketCompression = true

[browser]
gatherUsageStats = false

[runner]
magicEnabled = false
fastReruns = true

[client]
showSidebarNavigation = false
toolbarMode = "minimal"

# HAILIE design system palette (see design_system_preview.html)
# Deep HAILIE Teal primary, white-dominant cards on a soft-mist page.
[theme]
primaryColor = "#0B5C70"
backgroundColor = "#F4F8F9"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1F2933"
